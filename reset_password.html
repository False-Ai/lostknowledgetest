<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Set a new password for your Lost Knowledge account.">
  <title>Reset Password — Lost Knowledge</title>
  <link rel="stylesheet" href="/lost-knowledge/assets/css/style.css">
  <link rel="stylesheet" href="/lost-knowledge/assets/css/features.css">
</head>
<body>

<header class="site-header">
  <div class="container nav-inner">
    <a href="/lost-knowledge/index.html" class="site-logo">
      <img src="/lost-knowledge/assets/logo.png" alt="Lost Knowledge" class="nav-logo-img">
      <div class="logo-text">
        <span class="logo-mark">Lost Knowledge</span>
        <span class="logo-sub">Archive of Vanishing Wisdom</span>
      </div>
    </a>
    <button class="nav-toggle" aria-label="Toggle navigation menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <nav class="nav-links" aria-label="Main navigation">
      <a href="/lost-knowledge/index.html"    class="nav-link">Archive</a>
      <a href="/lost-knowledge/about.php"    class="nav-link">About</a>
      <a href="/lost-knowledge/register.html" class="nav-link">Register</a>
      <a href="/lost-knowledge/login.html"    class="nav-link">Sign In</a>
    </nav>
  </div>
</header>

<div class="page-header">
  <div class="container">
    <div class="section-label">Account recovery</div>
    <h1>Set new password</h1>
    <p>Choose a strong password for your account.</p>
  </div>
</div>

<main>
  <div class="form-wrap">
    <div class="form-card">

      <!-- Flash messages -->
      <div id="flashMsg" style="display:none" class="alert alert-error" role="alert"></div>
      <div id="flashSuccess" style="display:none" class="alert alert-success" role="alert"></div>

      <div class="form-card-header">
        <h2>New password</h2>
        <p>Enter your new password below</p>
      </div>

      <form id="resetForm" method="POST" action="/lost-knowledge/reset_password_process.php" novalidate>
        <!-- Token from URL -->
        <input type="hidden" name="token" id="resetToken" value="">

        <div class="form-row">
          <div class="form-group">
            <label for="password">New password <span class="req">*</span></label>
            <input type="password" id="password" name="password"
                   placeholder="Min. 8 characters"
                   autocomplete="new-password">
            <span class="field-error" id="passError"></span>
          </div>
          <div class="form-group">
            <label for="password_confirm">Confirm <span class="req">*</span></label>
            <input type="password" id="password_confirm" name="password_confirm"
                   placeholder="Repeat password"
                   autocomplete="new-password">
            <span class="field-error" id="confirmError"></span>
          </div>
        </div>

        <p style="font-size:.8rem;color:var(--ink-300);margin-bottom:1.25rem">
          Password needs 8+ characters, one uppercase letter, and one number.
        </p>

        <hr class="form-divider">

        <button type="submit" class="btn btn-primary btn-full btn-lg">Update password →</button>
      </form>
    </div>
  </div>
</main>

<footer class="site-footer" style="padding:1.5rem 0">
  <div class="container">
    <div class="footer-bottom">
      <span>&copy; <span id="yr"></span> Lost Knowledge</span>
      <span><a href="/lost-knowledge/about.php" style="color:var(--ink-300)">About</a></span>
    </div>
  </div>
</footer>

<script src="/lost-knowledge/assets/js/script.js"></script>
<script src="/lost-knowledge/assets/js/features.js"></script>
<script>
  document.getElementById('yr').textContent = new Date().getFullYear();

  // Grab token from URL and set in hidden field
  const params = new URLSearchParams(location.search);
  const token  = params.get('token');
  if (token) {
    document.getElementById('resetToken').value = token;
  } else {
    document.getElementById('flashMsg').textContent = 'Invalid or missing reset link. Please request a new one.';
    document.getElementById('flashMsg').style.display = 'flex';
    document.getElementById('resetForm').style.display = 'none';
  }

  // Show error/success from URL
  const err = params.get('error');
  const ok  = params.get('success');
  if (err) {
    const box = document.getElementById('flashMsg');
    box.textContent = decodeURIComponent(err);
    box.style.display = 'flex';
  }
  if (ok) {
    const box = document.getElementById('flashSuccess');
    box.textContent = decodeURIComponent(ok);
    box.style.display = 'flex';
  }

  // Client-side validation
  const form = document.getElementById('resetForm');
  form.addEventListener('submit', function(e) {
    let valid = true;
    const pass    = form.querySelector('[name=password]');
    const confirm = form.querySelector('[name=password_confirm]');
    const passErr = document.getElementById('passError');
    const confErr = document.getElementById('confirmError');

    passErr.textContent = ''; confErr.textContent = '';
    pass.classList.remove('error'); confirm.classList.remove('error');

    if (pass.value.length < 8) {
      passErr.textContent = 'Password must be at least 8 characters.';
      pass.classList.add('error'); valid = false;
    } else if (!/[A-Z]/.test(pass.value)) {
      passErr.textContent = 'Need at least one uppercase letter.';
      pass.classList.add('error'); valid = false;
    } else if (!/[0-9]/.test(pass.value)) {
      passErr.textContent = 'Need at least one number.';
      pass.classList.add('error'); valid = false;
    }

    if (pass.value !== confirm.value) {
      confErr.textContent = 'Passwords do not match.';
      confirm.classList.add('error'); valid = false;
    }

    if (!valid) e.preventDefault();
  });
</script>
</body>
</html>
